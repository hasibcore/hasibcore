<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%">
  <defs>
    <!-- Cyan glow filter -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Purple glow filter -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes spin-cw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes spin-ccw {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    @keyframes scanline {
      0% { transform: translateY(-10px); opacity: 0.3; }
      50% { opacity: 0.8; }
      100% { transform: translateY(390px); opacity: 0.3; }
    }
    @keyframes pulse-fast {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes type-line-1 {
      0% { width: 0; }
      10% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes type-line-2 {
      0%, 10% { width: 0; }
      20% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes type-line-3 {
      0%, 20% { width: 0; }
      35% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes type-line-4 {
      0%, 35% { width: 0; }
      50% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes type-line-5 {
      0%, 50% { width: 0; }
      65% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes type-line-6 {
      0%, 65% { width: 0; }
      80% { width: 100%; }
      100% { width: 100%; }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes signal-travel {
      0% { offset-distance: 0%; }
      100% { offset-distance: 100%; }
    }
    @keyframes hologramFlicker {
      0%, 93%, 95%, 100% { opacity: 0.98; }
      94% { opacity: 0.82; }
      96% { opacity: 0.88; }
    }

    .bg-grid {
      fill: none;
      stroke: rgba(0, 212, 255, 0.02);
      stroke-width: 1;
    }
    .hud-border {
      fill: rgba(2, 6, 26, 0.7);
      stroke: rgba(0, 212, 255, 0.15);
      stroke-width: 1.5;
      filter: url(#glow-cyan);
    }
    .hud-line-cyan {
      stroke: rgba(0, 212, 255, 0.5);
      stroke-width: 1;
      filter: url(#glow-cyan);
    }
    .hud-line-purple {
      stroke: rgba(138, 43, 226, 0.5);
      stroke-width: 1.2;
      filter: url(#glow-purple);
    }
    .txt-cyan {
      fill: #00d4ff;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      filter: url(#glow-cyan);
    }
    .txt-purple {
      fill: #bd93f9;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      filter: url(#glow-purple);
    }
    .txt-dim {
      fill: rgba(0, 212, 255, 0.4);
      font-family: 'Fira Code', monospace;
      font-size: 10px;
    }
    .spin-center-cw {
      transform-origin: 110px 190px;
      animation: spin-cw 20s linear infinite;
    }
    .spin-center-ccw {
      transform-origin: 110px 190px;
      animation: spin-ccw 14s linear infinite;
    }
    .scanner {
      animation: scanline 6s linear infinite;
      transform-origin: center;
    }
    .flicker {
      animation: hologramFlicker 6s infinite alternate;
    }
    .typing-1 { overflow: hidden; white-space: nowrap; animation: type-line-1 12s infinite; }
    .typing-2 { overflow: hidden; white-space: nowrap; animation: type-line-2 12s infinite; }
    .typing-3 { overflow: hidden; white-space: nowrap; animation: type-line-3 12s infinite; }
    .typing-4 { overflow: hidden; white-space: nowrap; animation: type-line-4 12s infinite; }
    .typing-5 { overflow: hidden; white-space: nowrap; animation: type-line-5 12s infinite; }
    .typing-6 { overflow: hidden; white-space: nowrap; animation: type-line-6 12s infinite; }
    
    .tree-node {
      fill: #02020f;
      stroke: #00d4ff;
      stroke-width: 1.5;
      filter: url(#glow-cyan);
    }
    .tree-node-active {
      fill: #02020f;
      stroke: #bd93f9;
      stroke-width: 2;
      filter: url(#glow-purple);
      animation: pulse-slow 2s infinite;
    }
    .signal-path {
      fill: none;
      stroke: rgba(0, 212, 255, 0.1);
      stroke-width: 1.5;
    }
    .signal-dot {
      fill: #00d4ff;
      filter: url(#glow-cyan);
      /* path to animate along */
      motion-path: path("M 690 100 L 630 160 L 590 230");
      offset-path: path("M 690 100 L 630 160 L 590 230");
      animation: signal-travel 4s linear infinite;
    }
    .signal-dot-2 {
      fill: #bd93f9;
      filter: url(#glow-purple);
      motion-path: path("M 690 100 L 750 160 L 790 230");
      offset-path: path("M 690 100 L 750 160 L 790 230");
      animation: signal-travel 3.5s linear infinite;
      animation-delay: 1.5s;
    }
  </style>

  <!-- Background Base Grid -->
  <rect width="800" height="380" fill="#01020a" rx="10" />
  
  <!-- Subtle Cross Grid -->
  <path class="bg-grid" d="
    M 50 0 V 380 M 100 0 V 380 M 150 0 V 380 M 200 0 V 380 M 250 0 V 380 M 300 0 V 380 M 350 0 V 380 M 400 0 V 380 M 450 0 V 380 M 500 0 V 380 M 550 0 V 380 M 600 0 V 380 M 650 0 V 380 M 700 0 V 380 M 750 0 V 380
    M 0 50 H 800 M 0 100 H 800 M 0 150 H 800 M 0 200 H 800 M 0 250 H 800 M 0 300 H 800 M 0 350 H 800
  " />
  
  <!-- Outer Console Border -->
  <rect x="10" y="10" width="780" height="360" rx="8" fill="none" stroke="rgba(0, 212, 255, 0.08)" stroke-width="2" />
  <path class="hud-line-cyan" d="M 10 30 H 790 M 10 350 H 790" opacity="0.3" />
  
  <!-- Corner Tech Accents -->
  <path class="hud-line-cyan" d="M 10 50 V 10 H 50 M 790 50 V 10 H 750 M 10 330 V 370 H 50 M 790 330 V 370 H 750" />
  
  <g class="flicker">
    <!-- TOP BAR: Header details -->
    <text x="25" y="24" class="txt-cyan" font-size="10" font-weight="700">SYS::TERMINAL_READY</text>
    <text x="775" y="24" class="txt-cyan" font-size="10" text-anchor="end" opacity="0.8">GEO_NODE::DHAKA (23.81° N)</text>

    <!-- LEFT COLUMN: Rotating Vector Radar / Dials -->
    <g>
      <!-- Radar grid rings -->
      <circle cx="110" cy="190" r="80" fill="none" stroke="rgba(0, 212, 255, 0.04)" stroke-width="1" />
      <circle cx="110" cy="190" r="60" fill="none" stroke="rgba(0, 212, 255, 0.04)" stroke-width="1" />
      <circle cx="110" cy="190" r="40" fill="none" stroke="rgba(0, 212, 255, 0.04)" stroke-width="1" />
      
      <!-- Crosshairs -->
      <line x1="110" y1="100" x2="110" y2="280" stroke="rgba(0, 212, 255, 0.05)" stroke-width="1" />
      <line x1="20" y1="190" x2="200" y2="190" stroke="rgba(0, 212, 255, 0.05)" stroke-width="1" />
      
      <!-- Concentric animated dials -->
      <g class="spin-center-cw">
        <circle cx="110" cy="190" r="74" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="100 80" opacity="0.3" filter="url(#glow-cyan)" />
        <circle cx="110" cy="190" r="50" fill="none" stroke="#bd93f9" stroke-width="1.5" stroke-dasharray="10 40 60 20" opacity="0.4" filter="url(#glow-purple)" />
      </g>
      
      <g class="spin-center-ccw">
        <circle cx="110" cy="190" r="66" fill="none" stroke="#00d4ff" stroke-width="1" stroke-dasharray="40 100 15 20" opacity="0.3" filter="url(#glow-cyan)" />
      </g>
      
      <!-- Static compass markings -->
      <text x="110" y="103" class="txt-cyan" font-size="7" text-anchor="middle">000°</text>
      <text x="194" y="193" class="txt-cyan" font-size="7" text-anchor="left">090°</text>
      <text x="110" y="278" class="txt-cyan" font-size="7" text-anchor="middle">180°</text>
      <text x="26" y="193" class="txt-cyan" font-size="7" text-anchor="right">270°</text>
      
      <text x="110" y="180" class="txt-cyan" font-size="9" font-weight="700" text-anchor="middle" filter="url(#glow-cyan)">ACTIVE</text>
      <text x="110" y="205" class="txt-purple" font-size="9" font-weight="700" text-anchor="middle" filter="url(#glow-purple)">RADAR</text>
    </g>

    <!-- CENTER COLUMN: Terminal / Typewriter Box -->
    <g transform="translate(230, 60)">
      <!-- Console background glass card -->
      <rect x="0" y="0" width="340" height="260" rx="6" fill="rgba(2, 6, 26, 0.6)" stroke="rgba(0, 212, 255, 0.12)" stroke-width="1" filter="url(#glow-cyan)" />
      <path d="M 0 20 H 340" stroke="rgba(0, 212, 255, 0.12)" stroke-width="1" />
      <circle cx="10" cy="10" r="3" fill="#ff5555" opacity="0.7" />
      <circle cx="20" cy="10" r="3" fill="#ffb86c" opacity="0.7" />
      <circle cx="30" cy="10" r="3" fill="#50fa7b" opacity="0.7" />
      <text x="170" y="14" class="txt-cyan" font-size="8" text-anchor="middle" opacity="0.6">bash::hasibcore@terminal</text>
      
      <!-- Terminal Content -->
      <g transform="translate(15, 45)">
        <!-- Line 1 -->
        <g class="typing-1">
          <text x="0" y="0" class="txt-cyan" xml:space="preserve">&gt; const developer = {</text>
        </g>
        
        <!-- Line 2 -->
        <g class="typing-2">
          <text x="0" y="22" class="txt-cyan" xml:space="preserve">    name: 'Hasibul Hasan',</text>
        </g>
        
        <!-- Line 3 -->
        <g class="typing-3">
          <text x="0" y="44" class="txt-cyan" xml:space="preserve">    handle: 'hasibcore',</text>
        </g>

        <!-- Line 4 -->
        <g class="typing-4">
          <text x="0" y="66" class="txt-cyan" xml:space="preserve">    focus: ['Algorithms', 'CP'],</text>
        </g>

        <!-- Line 5 -->
        <g class="typing-5">
          <text x="0" y="88" class="txt-cyan" xml:space="preserve">    status: 'OPTIMAL'</text>
        </g>

        <!-- Line 6 -->
        <g class="typing-6">
          <text x="0" y="110" class="txt-cyan" xml:space="preserve">  };</text>
        </g>
        
        <!-- Interactive Code logs -->
        <g transform="translate(0, 140)">
          <text x="0" y="0" class="txt-purple" font-weight="700">&gt; Syncing remote nodes...</text>
          <text x="0" y="16" class="txt-cyan" font-size="10" opacity="0.7">&gt; Dhaka central node latency: 12ms</text>
          <text x="0" y="32" class="txt-cyan" font-size="10" opacity="0.7">&gt; Codeforces rating status: Synchronized</text>
          <text x="0" y="48" class="txt-purple" font-size="10" font-weight="700">&gt; System Status: ACTIVE_RUNNING</text>
        </g>
      </g>
    </g>

    <!-- RIGHT COLUMN: Algorithmic BST Search Tree visualizer -->
    <g transform="translate(560, 40)">
      <!-- Panel Border outline -->
      <rect x="20" y="20" width="200" height="260" rx="6" fill="rgba(2, 6, 26, 0.4)" stroke="rgba(0, 212, 255, 0.08)" stroke-width="1" />
      <text x="120" y="40" class="txt-cyan" font-size="9" font-weight="700" text-anchor="middle" filter="url(#glow-cyan)">ALGO::BST_TRAVERSAL</text>
      
      <!-- Graph Node connections -->
      <path class="signal-path" d="M 120 70 L 70 120 M 120 70 L 170 120 M 70 120 L 40 180 M 70 120 L 100 180 M 170 120 L 140 180 M 170 120 L 200 180" stroke="rgba(0, 212, 255, 0.08)" stroke-width="1" />
      <path d="M 120 70 L 70 120 L 40 180" stroke="rgba(0, 212, 255, 0.3)" stroke-width="1" fill="none" />
      <path d="M 120 70 L 170 120 L 200 180" stroke="rgba(138, 43, 226, 0.3)" stroke-width="1" fill="none" />
      
      <!-- Animated signal dots traversing the tree -->
      <circle class="signal-dot" r="4" />
      <circle class="signal-dot-2" r="4" />
      
      <!-- Node Circles -->
      <!-- Level 0 (Root) -->
      <circle cx="120" cy="70" r="10" class="tree-node" />
      <text x="120" y="73" class="txt-cyan" font-size="7" font-weight="700" text-anchor="middle">50</text>
      
      <!-- Level 1 -->
      <circle cx="70" cy="120" r="8" class="tree-node" />
      <text x="70" y="123" class="txt-cyan" font-size="6" text-anchor="middle">30</text>
      
      <circle cx="170" cy="120" r="8" class="tree-node-active" />
      <text x="170" y="123" class="txt-purple" font-size="6" text-anchor="middle">70</text>
      
      <!-- Level 2 (Leaves) -->
      <circle cx="40" cy="180" r="7" class="tree-node" />
      <text x="40" y="183" class="txt-cyan" font-size="5" text-anchor="middle">15</text>
      
      <circle cx="100" cy="180" r="7" class="tree-node" />
      <text x="100" y="183" class="txt-cyan" font-size="5" text-anchor="middle">40</text>
      
      <circle cx="140" cy="180" r="7" class="tree-node" />
      <text x="140" y="183" class="txt-cyan" font-size="5" text-anchor="middle">60</text>
      
      <circle cx="200" cy="180" r="7" class="tree-node-active" />
      <text x="200" y="183" class="txt-purple" font-size="5" text-anchor="middle">85</text>
      
      <!-- Traversal pointers text -->
      <text x="135" y="73" class="txt-dim" font-size="6">*root</text>
      <text x="183" y="123" class="txt-purple" font-size="6" font-weight="700">*curr</text>
    </g>
  </g>

  <!-- Horizontal glowing light scanner bar -->
  <line class="scanner" x1="15" y1="0" x2="785" y2="0" stroke="rgba(0, 212, 255, 0.4)" stroke-width="2" filter="url(#glow-cyan)" />
</svg>
