<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 100" fill="none">
  <defs>
    <linearGradient id="beam-glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Hologram Projector Beam -->
  <polygon points="320,0 480,0 520,80 280,80" fill="url(#beam-glow)"/>
  <!-- Emitter Base Line -->
  <line x1="100" y1="80" x2="700" y2="80" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
  <!-- Subtler tech lines -->
  <line x1="50" y1="84" x2="750" y2="84" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.5"/>
  <!-- Center emitter -->
  <ellipse cx="400" cy="80" rx="50" ry="10" fill="#02020f" stroke="#00d4ff" stroke-width="2" filter="url(#glow)"/>
  <ellipse cx="400" cy="80" rx="25" ry="5" fill="#00d4ff" filter="url(#glow)"/>
  <!-- Decorative digital dots -->
  <circle cx="250" cy="80" r="3" fill="#00d4ff" filter="url(#glow)"/>
  <circle cx="550" cy="80" r="3" fill="#00d4ff" filter="url(#glow)"/>
  <!-- Technical angle accents -->
  <polyline points="200,80 190,74 160,74" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.7"/>
  <polyline points="600,80 610,74 640,74" stroke="#00d4ff" stroke-width="1" stroke-opacity="0.7"/>
</svg>
